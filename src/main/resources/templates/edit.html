<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Part</title>
</head>

<body>

<h1>Update Part</h1>

<form action="/update" method="post">

    <input type="hidden"
           name="id"
           th:value="${part.id}">

    <br><br>

    <input type="text"
           name="bikeCompany"
           th:value="${part.bikeCompany}"
           placeholder="Bike Company">

    <br><br>

    <input type="text"
           name="bikeName"
           th:value="${part.bikeName}"
           placeholder="Bike Name">

    <br><br>
    
    <input type="text"
       name="rackNumber"
       th:value="${part.rackNumber}">
       
    <br><br>

    <input type="text"
           name="partName"
           th:value="${part.partName}"
           placeholder="Part Name">

    <br><br>

    <input type="number"
           name="price"
           th:value="${part.price}"
           placeholder="Price">

    <br><br>

    <input type="number"
           name="quantity"
           th:value="${part.quantity}"
           placeholder="Quantity">

    <br><br>

    <button type="submit">
        Update
    </button>

</form>

</body>
</html>
